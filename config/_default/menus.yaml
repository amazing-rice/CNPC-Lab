# Navigation Links (导航链接配置)
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
#     desired widget in your `content/home/` folder.
#   (中文说明：若要链接到主页上的某个组件/板块，请将 URL 设置为 '#' 加上 'content/home/' 文件夹中对应的文件名。)
#   The weight parameter defines the order that the links will appear in.
#   (中文说明：weight 参数定义了链接出现的顺序，数字越小越靠前。)

# Navigation Links (导航链接配置)
main:
  # 1. 首页 (保持最简)
  - name: 首页
    url: /
    weight: 10

  # 2. 团队人员
  - name: 团队概况
    url: people
    weight: 20

  # 3. 实验平台 (精简名称，作为主菜单)
  - name: 实验平台
    url: equipment
    weight: 30

  # 4. 科研与成果 (利用下拉菜单整合内容)
  - name: 科研成果
    url: publication
    weight: 40

  # 5. 资讯与动态 (整合新闻和学术活动)
  - name: 新闻动态
    url: # 这里留空或者写一个概览页链接，作为父级菜单
    weight: 50
  
  # 5.1 新闻动态的子菜单：实验室新闻
  - name: 实验室新闻
    url: post
    parent: 新闻动态 # 指向父级菜单的 name
    weight: 1

  # 5.2 新闻动态的子菜单：学术活动
  - name: 学术活动
    url: event
    parent: 新闻动态
    weight: 2

  # 6. 联系我们
  - name: 联系我们
    url: contact
    weight: 60