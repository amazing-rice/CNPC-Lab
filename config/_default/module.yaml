imports:
  # 1. Decap CMS 插件 (原名 Netlify CMS)
  # 作用：为您提供一个在线后台 (通常是 /admin)。
  # 开启后，您可以在网页上直接编辑文章和发布新闻，而不需要每次都打开代码编辑器。
  - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-decap-cms

  # 2. Netlify 部署插件
  # 作用：如果您将网站托管在 Netlify 平台上，这个插件会自动生成必要的配置文件
  # (如 _redirects 和 _headers)，确保网站加载速度快且路径正确。
  - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-plugin-netlify

  # 3. Hugo Blox Bootstrap v5 (核心主题引擎)
  # 作用：这是整个网站的“骨架”和“皮肤”，基于 Bootstrap 5 框架。
  # 【⚠️ 警告】绝对不要删除或修改这一行，否则整个网站的样式会瞬间丢失，变成一堆乱码。
  - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5