# 模板名称：Research Group (课题组/研究团队)
name = "Research Group"

# 许可证类型：MIT 开源协议
license = "MIT"

# 许可证文件的具体链接
licenselink = "https://github.com/wowchemy/starter-hugo-research-group/blob/main/LICENSE.md"

# 模板描述：
# "Research Group Template 能够让您的课题组轻松创建一个美观的网站，
# 包含令人惊叹的主页、新闻、学术出版物、活动、团队成员简介以及联系表单。"
description = "The **Research Group Template** empowers your research group to easily create a beautiful website with a stunning homepage, news, academic publications, events, team profiles, and a contact form."

# 项目的主页 (GitHub 仓库地址)
homepage = "https://github.com/wowchemy/starter-hugo-research-group"

# 演示站点链接 (在线预览地址)
demosite = "https://research-group.netlify.app/"

# 标签列表：用于主题市场的分类和搜索
# 包含：学术(academic), 大学(university), 研究(research), 出版物(publications),
# 组件(widgets), 作品集(portfolio), 响应式(responsive), 极简(minimal), 多语言(multilingual)等
tags = ["academic",
        "university",
        "research",
        "publications",
        "widgets",
        "portfolio",
        "responsive",
        "clean",
        "company",
        "blog",
        "events",
        "minimal",
        "light",
        "dark",
        "multilingual",
        "landing page",
        "contact form",
        "mobile",
        "search",
        "presentation",
        "simple",
        "minimalist",
        "starter",
        "modern",
        "one page",
        "customizable",
        "technical",
        "slide"
        ]

# 功能特性列表：
# 包含：页面构建器(page builder), 挂件/组件(widgets), 主题(themes), 搜索(search),
# 研究出版物系统(research publication system), 可筛选作品集(filterable portfolio),
# 博客(blog), 创建课程(create courses), 演讲(talks), 事件(events), 幻灯片(slides), 画廊(gallery), 联系表单(contact form)
features = ["page builder", "widgets", "themes", "search", "research publication system", "filterable portfolio",
            "blog", "create courses", "talks", "events", "slides", "gallery", "contact form"]

# 作者信息部分
[author]
  # 作者姓名
  name = "George Cushen"
  # 作者个人主页
  homepage = "https://georgecushen.com"